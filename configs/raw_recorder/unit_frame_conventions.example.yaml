# Example unit/frame conventions for future raw real episodes.
# Raw source conventions are candidates until lab verification confirms them.
schema_version: raw_unit_frame_conventions_v0

processed_targets:
  tcp_translation_units: meters
  joint_position_units: radians
  joint_velocity_units: radians_per_second
  orientation_quaternion_convention: xyzw
  action_rotation_representation: rotation_vector
  action_shape: 7

raw_candidates:
  doosan_robot_state_rt:
    tcp_translation_units: millimeters
    tcp_orientation_units: degrees
    tcp_orientation_convention: unknown_verify_euler_order
    converter_supported_tcp_orientation_conventions:
      - rotation_vector_degrees
      - rotation_vector_radians
    recognized_but_unsupported_tcp_orientation_conventions:
      - doosan_posx_euler_zyz_degrees
      - doosan_robotstate_actual_tcp_position_euler_zyz_degrees
      - euler_zyz_degrees
    current_converter_rejects_unknown_euler_conventions: true
    notes: Do not label native Doosan Euler pose values as rotation vectors unless live verification proves that convention and a converter path supports it.
    joint_position_units: degrees
    joint_velocity_units: degrees_per_second
    force_units: N
    torque_units: Nm
    verified: false
  joint_states_topic:
    joint_position_units: radians
    joint_velocity_units: radians_per_second
    effort_units: unknown
    verified: false

frames:
  base_frame:
    name: unknown
    verified: false
  tcp_frame:
    name: unknown
    verified: false
    notes: TCP/flange/tool frame ambiguity must be resolved in lab.
  flange_frame:
    name: unknown
    verified: false
  tool_frame:
    name: unknown
    verified: false
  tcp_camera_frame:
    name: unknown
    verified: false
  external_camera_1_frame:
    name: unknown
    verified: false
  external_camera_2_frame:
    name: unknown
    verified: false
  force_torque_frame:
    name: tcp_frame
    verified: false
    notes: Preferred wrench is Doosan internal tcp_wrench [Fx, Fy, Fz, Tx, Ty, Tz] in N/Nm; frame, compensation, and sign convention must be verified.

conversion_policy:
  compute_action_from: measured_consecutive_tcp_pose
  record_index_policy: episode_level_aligned_sample_index_for_converter_streams
  timestamp_alignment: diagnostics_only_no_interpolation_in_raw_real_v0
  block_large_required_camera_source_stamp_offsets: true
  default_camera_robot_source_stamp_offset_tolerance: 0.5 / fps
  fallback_camera_robot_source_stamp_offset_tolerance_sec: 0.02
  optional_timebase_override_key: max_camera_robot_source_stamp_offset_sec
  max_camera_robot_source_stamp_offset_override: min(0.1, 2.0 / fps)
  command_streams_are_labels: false
  terminal_padding_action: [0, 0, 0, 0, 0, 0, 0]
  normalize_tcp_translation_to_meters: true
  normalize_joint_positions_to_radians: true
  verify_quaternion_conversion_before_training: true
  tcp_orientation_policy: raw Doosan Euler ZYZ may be preserved separately, but model/converter orientation must be normalized to rotation_vector_degrees or rotation_vector_radians; do not guess three-number orientation conventions.
